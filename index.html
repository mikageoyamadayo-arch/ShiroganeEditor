<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白銀が護りし緋の神子 書庫</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <h1>白銀が護りし緋の神子</h1>

    <h2>書庫</h2>

    <p class="catch">
        誰を想うのか。誰を護るのか。<br>
        誰を救うのか。<br>
        そして、何を選ぶのか――。
    </p>

</header>

<main>

<section class="bookshelf">

<h3>📚 本棚</h3>

<div class="book-grid">

<button class="book">
    <span class="book-icon">🐤</span>
    <span class="book-title">花笑の箒星</span>
</button>

<button class="book">
    <span class="book-icon">🌸</span>
    <span class="book-title">金霞の五星</span>
</button>

<button class="book">
    <span class="book-icon">❄️</span>
    <span class="book-title">銀嶺の秘鑰</span>
</button>

</div>

</section>

<section class="library">

<h3>📖 書庫資料</h3>

<div class="menu-grid">

<button class="menu">👤 人物録</button>

<button class="menu">📖 設定集</button>

<button class="menu">📜 年代記</button>

<button class="menu">📚 読書録</button>

<button class="menu">🖋 手帳</button>

<button class="menu">⚙️ 設定</button>

</div>

</section>

<section class="guide">

<div id="ikoi-message">

<p>

📖 今日も、物語を紡ぎましょう。

</p>

</div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
