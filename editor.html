<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>白銀エディタ</title>

    <link rel="stylesheet" href="style.css?v=4">
</head>

<body>

    <div class="container">

        <h1>🖋️ 白銀エディタ</h1>

        <p class="catch">
            句を執筆する
        </p>

        <div class="editor-area">

            <label for="chapterSelect">
    折
</label>

<select id="chapterSelect">
    <option value="chapter1">
        第1折　結成、特務部隊・白銀
    </option>

    <option value="chapter2">
        第2折　カフェーという闇
    </option>

    <option value="chapter3">
        第3折　それぞれの想い
    </option>

    <option value="chapter4">
        第4折　終わりの始まり
    </option>

    <option value="chapter5">
        第5折　追うものから追われるものへ
    </option>
</select>
            
    <label for="verseSelect">
       保存済みの句
    </label>

<select id="verseSelect">
</select>    
            
            <label for="verseTitle">
                句の題名
            </label>

            <input
                type="text"
                id="verseTitle"
                placeholder="例：1句　彩られし再会"
            >

            <button type="button" id="newVerseButton">
                ＋ 新しい句を作る
            </button>  
            
            <label for="manuscript">
                本文
            </label>

            <textarea
                id="manuscuript"
                placeholder="ここに本文を書きます">
                </textarea>

　　　　　　　　<button type="button" id="copyButton">
                📋 本文をコピー
　　　　　　　　</button> 
            
            <p id="characterCount">
                文字数：0文字
            </p>

            <p id="saveStatus">
                未保存
            </p>

        </div>

        <button onclick="location.href='index.html'">
            ← 書庫へ戻る
        </button>

    </div>
    
    <script src="editor.js?v=2"></script>

</body>

</html>
</html>
